_schema-version: 3.3.0
ID: tam-app
description: A simple CAP project.
version: 1.0.0
modules:
  - name: tam-app-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: tam-app-db
      - name: uaa_tam-app
      - name: tam-credentials
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: tam-app-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: tam-app-db
    parameters:
      buildpack: nodejs_buildpack
resources:
  - name: tam-app-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: uaa_tam-app
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-name: tam-app-xsuaa-service
      service-plan: application
  - name: tam-credentials
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: tam-credentials
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - bash -c "cd app/project1 && npm install && npm run build:cf"
        - npx cds build --production
        - mkdir -p gen/srv/app/project1
        - bash -c "cp -r app/project1/dist/* gen/srv/app/project1/"